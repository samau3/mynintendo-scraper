services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mynintendo
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/mynintendo
    ports:
      - "5000:8080"
    depends_on:
      - db

volumes:
  postgres_data:
